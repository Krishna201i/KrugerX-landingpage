<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrugerX - AI Powered Browser</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Mystical CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mystical.css') }}">
</head>
<body>
    <!-- Custom Magnetic Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <!-- Flash Messages (If any remain) -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <!-- Main Content Wrapper for Smooth Scroll / GSAP -->
    <div id="smooth-wrapper">
        <div id="smooth-content">
            <main>
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Libraries -->
    <!-- GSAP Core & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <!-- Vanilla Tilt for 3D Cards -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    
    <!-- Status Polling JS -->
    <script>
        async function fetchStatus() {
            const statusIndicator = document.getElementById('status-indicator');
            const statusText = document.getElementById('status-text');
            if(!statusIndicator) return;
            
            try {
                const response = await fetch('/status');
                const data = await response.json();
                
                statusText.innerText = data.message;
                statusIndicator.className = 'status-dot';
                if(data.status === 'online') {
                    statusIndicator.classList.add('online');
                } else if(data.status === 'degraded') {
                    statusIndicator.classList.add('degraded');
                } else {
                    statusIndicator.classList.add('offline');
                }
            } catch (error) {
                statusText.innerText = "Sanctum Integrity Unknown";
                statusIndicator.className = 'status-dot offline';
            }
        }
        
        fetchStatus();
        setInterval(fetchStatus, 30000);
    </script>
    
    <!-- Mystical Live Animations -->
    <script src="{{ url_for('static', filename='js/mystical.js') }}"></script>
</body>
</html>
